<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>TRACKER 🧪</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Tracker','short_name':'Tracker','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#ccff00'}">

    <style>
        :root {
            --bg: #000000; --card: #111111; --neon: #ccff00; 
            --text: #ffffff; --drawer-bg: #151515; --input-bg: #080808;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); padding: 0; margin: 0; 
            font-variant-numeric: lining-nums tabular-nums;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Navbar */
        .navbar { 
            background: var(--card); padding: env(safe-area-inset-top) 15px 10px 15px; 
            display: flex; align-items: center; border-bottom: 2px solid var(--neon); 
            position: sticky; top: 0; z-index: 100; gap: 10px;
        }
        .menu-btn { font-size: 28px; cursor: pointer; color: var(--neon); background: none; border: none; order: 2; }
        .nav-logo { font-weight: 900; color: var(--neon); font-size: 1.2rem; margin-right: auto; order: 0; }
        
        #dayFilter {
            background: #111; color: var(--neon); border: 1px solid var(--neon);
            padding: 8px; border-radius: 8px; flex-grow: 1; outline: none; font-weight: bold; order: 1; margin: 0 10px;
        }

        /* Drawer */
        .drawer { 
            position: fixed; top: 0; left: -100%; width: 85%; height: 100%; 
            background: var(--drawer-bg); z-index: 1000; transition: 0.4s ease;
            padding: 40px 25px 25px 25px; box-sizing: border-box; border-right: 1px solid var(--neon);
        }
        .drawer.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.show { display: block; }

        .drawer input { background: #222; color: white; border: 1px solid #444; padding: 12px; margin: 10px 0; width: 100%; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: var(--neon); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* Training Display */
        .container { padding: 20px; padding-bottom: 50px; }
        .day-group { margin-bottom: 30px; }
        .day-label { 
            background: var(--neon); color: black; padding: 6px 16px; border-radius: 8px; 
            font-size: 14px; font-weight: 900; display: inline-block; margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .ex-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid #222;
        }
        .ex-card.completed { opacity: 0.3; filter: grayscale(1); }

        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ex-name { font-weight: bold; font-size: 20px; color: var(--neon); }

        .check-box { 
            width: 38px; height: 38px; border: 2px solid var(--neon); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .completed .check-box { background: var(--neon); color: black; }
        .completed .check-box::after { content: "✓"; font-weight: 900; font-size: 24px; }

        .controls-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; }
        .edit-item { display: flex; align-items: center; gap: 6px; }
        .edit-item label { color: #666; font-size: 11px; font-weight: bold; }
        .edit-item input { 
            width: 65px; background: var(--input-bg); color: var(--neon); border: none; 
            padding: 10px 5px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 16px;
        }
        .del-btn { background: none; border: none; cursor: pointer; font-size: 20px; opacity: 0.4; margin-left: auto; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-logo">TRACKER</div>
        <select id="dayFilter" onchange="render()"><option value="all">ALL DAYS</option></select>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="drawer" id="drawer">
        <h3 style="color:var(--neon); margin-bottom:20px;">NEW EXERCISE ➕</h3>
        <input type="text" id="dayInput" placeholder="Day (e.g. PUSH)">
        <input type="text" id="exInput" placeholder="Exercise Name">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="weightInput" placeholder="KG">
            <input type="number" id="setsInput" placeholder="Sets">
            <input type="number" id="repsInput" placeholder="Reps">
        </div>
        <button class="btn-add" onclick="addExercise()">ADD TO LIST</button>
    </div>

    <div class="container" id="mainDisplay"></div>

    <script>
        let gymData = JSON.parse(localStorage.getItem('gymData')) || [];

        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function addExercise() {
            const day = document.getElementById('dayInput').value.trim().toUpperCase() || "GENERAL";
            const ex = document.getElementById('exInput').value.trim();
            const weight = document.getElementById('weightInput').value || 0;
            const sets = document.getElementById('setsInput').value || 0;
            const reps = document.getElementById('repsInput').value || 0;
            if(!ex) return;
            gymData.push({ id: Date.now(), day, ex, weight, sets, reps, done: false });
            saveAndRender();
            document.getElementById('exInput').value = "";
            toggleMenu();
        }

        function updateData(id, field, value) {
            const index = gymData.findIndex(item => item.id === id);
            gymData[index][field] = value;
            localStorage.setItem('gymData', JSON.stringify(gymData));
        }

        function toggleDone(id) {
            const index = gymData.findIndex(item => item.id === id);
            gymData[index].done = !gymData[index].done;
            saveAndRender();
        }

        function deleteItem(id) {
            if(confirm("Delete this exercise?")) {
                gymData = gymData.filter(item => item.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('gymData', JSON.stringify(gymData));
            updateFilterOptions();
            render();
        }

        function updateFilterOptions() {
            const filter = document.getElementById('dayFilter');
            const currentVal = filter.value;
            const days = [...new Set(gymData.map(item => item.day))];
            filter.innerHTML = '<option value="all">ALL DAYS</option>';
            days.forEach(day => { filter.innerHTML += `<option value="${day}">${day}</option>`; });
            filter.value = currentVal;
        }

        function render() {
            const container = document.getElementById('mainDisplay');
            const selectedDay = document.getElementById('dayFilter').value;
            container.innerHTML = '';
            let filteredData = selectedDay === 'all' ? gymData : gymData.filter(d => d.day === selectedDay);
            const groups = filteredData.reduce((acc, obj) => { acc[obj.day] = acc[obj.day] || []; acc[obj.day].push(obj); return acc; }, {});

            for (const day in groups) {
                let html = `<div class="day-group"><div class="day-label">${day}</div>`;
                groups[day].forEach(item => {
                    html += `
                        <div class="ex-card ${item.done ? 'completed' : ''}">
                            <div class="top-row">
                                <span class="ex-name">${item.ex}</span>
                                <div class="check-box" onclick="toggleDone(${item.id})"></div>
                            </div>
                            <div class="controls-grid">
                                <div class="edit-item"><label>SETS</label><input type="number" value="${item.sets}" onchange="updateData(${item.id}, 'sets', this.value)"></div>
                                <div class="edit-item"><label>KG</label><input type="number" value="${item.weight}" onchange="updateData(${item.id}, 'weight', this.value)"></div>
                                <div class="edit-item"><label>RPS</label><input type="number" value="${item.reps || 0}" onchange="updateData(${item.id}, 'reps', this.value)"></div>
                                <button class="del-btn" onclick="deleteItem(${item.id})">🗑️</button>
                            </div>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            }
        }
        updateFilterOptions();
        render();
    </script>
</body>
</html>
