<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACKER FIXED V8 🧪</title>
    <style>
        :root { --bg: #000000; --card: #111111; --neon: #ccff00; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        .navbar { background: var(--card); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; background: none; border: none; color: var(--neon); cursor: pointer; margin-right: 15px; }
        .nav-logo { font-weight: 900; color: var(--neon); font-size: 1.2rem; flex-grow: 1; text-transform: uppercase; }

        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: #080808; z-index: 1000; transition: 0.3s; padding: 25px; box-sizing: border-box; border-right: 1px solid var(--neon); overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 999; }
        .overlay.show { display: block; }

        .sidebar-h { color: var(--neon); font-size: 11px; font-weight: 900; margin-bottom: 12px; opacity: 0.8; }
        .color-picker-container { display: flex; align-items: center; gap: 15px; background: #111; padding: 12px; border-radius: 12px; border: 1px solid #222; margin-bottom: 25px; }
        #colorPicker { width: 45px; height: 45px; border: none; background: none; cursor: pointer; }

        .folder-item { padding: 14px; background: #111; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .folder-item.active { border-color: var(--neon); background: #1a1a1a; }
        
        .tab-bar { display: flex; overflow-x: auto; background: #050505; padding: 12px; gap: 8px; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; min-height: 45px; }
        .tab { padding: 10px 20px; background: #111; border: 1px solid #222; border-radius: 8px; color: #444; cursor: pointer; white-space: nowrap; font-weight: 900; font-size: 11px; }
        .tab.active { border-color: var(--neon); color: var(--neon); }

        .container { padding: 20px; padding-bottom: 120px; }
        .ex-card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .ex-card.done { opacity: 0.25; filter: grayscale(1); }
        .ex-name { font-weight: 900; font-size: 18px; color: var(--neon); display: block; margin-bottom: 15px; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .input-group { background: #000; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; border: 1px solid #1a1a1a; min-width: 80px; }
        .input-group label { font-size: 9px; color: #555; font-weight: 900; }
        .input-group input { width: 100%; background: none; border: none; color: var(--neon); text-align: center; font-weight: 900; font-size: 18px; outline: none; }

        .check-box { width: 45px; height: 45px; border: 2px solid var(--neon); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: auto; }
        .done .check-box { background: var(--neon); color: black; }
        .done .check-box::after { content: "✓"; font-weight: 900; font-size: 22px; }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon); border-radius: 50%; border: none; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 99; color: black; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; padding: 30px; box-sizing: border-box; flex-direction: column; justify-content: center; }
        .modal.open { display: flex; }
        .modal input { width: 100%; padding: 18px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 15px; outline: none; font-size: 16px; box-sizing: border-box; }
        .modal-row { display: flex; gap: 10px; width: 100%; }
        .modal-row input { flex: 1; min-width: 0; }
        .btn { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; color: black; font-size: 16px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="nav-logo" id="folderTitle">TRACKER</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-h">INTERFACE COLOR</div>
        <div class="color-picker-container">
            <input type="color" id="colorPicker" oninput="changeColor(this.value)">
            <span id="colorHex" style="font-family:monospace; font-size:13px; font-weight:bold;">#CCFF00</span>
        </div>
        <div class="sidebar-h">MY TRAINING PLANS 📂</div>
        <div id="folderList"></div>
        <button class="btn" style="background:#1a1a1a; color:var(--neon); border:1px solid var(--neon);" onclick="addFolder()">+ CREATE NEW PLAN</button>
        <div class="sidebar-h" style="margin-top:25px;">SYSTEM</div>
        <button class="btn" onclick="exportHub()">EXPORT HUB</button>
        <button class="btn" style="background:#111; color:white; border:1px solid #333; margin-top:8px;" onclick="importHub()">IMPORT HUB</button>
    </div>

    <div id="tabBar" class="tab-bar"></div>
    <div class="container" id="main"></div>
    <button class="fab" onclick="toggleModal()">+</button>

    <div class="modal" id="modal">
        <h2 style="color:var(--neon); text-align:center;">ADD EXERCISE</h2>
        <input type="text" id="dayIn" placeholder="Day (e.g. PUSH)">
        <input type="text" id="exIn" placeholder="Exercise Name">
        <div class="modal-row">
            <input type="number" id="setIn" placeholder="Sets">
            <input type="number" id="kgIn" placeholder="KG">
            <input type="number" id="repIn" placeholder="Reps">
        </div>
        <button class="btn" onclick="saveExercise()">SAVE TO PLAN</button>
        <button onclick="toggleModal()" style="background:none; color:#555; border:none; margin-top:20px; font-weight:bold;">CANCEL</button>
    </div>

    <script>
        // دالة تحميل البيانات الشاملة
        function loadData() {
            const keys = ['gym_hub_v4', 'gym_hub_v3', 'gym_hub_v2', 'gym_hub'];
            let combinedFolders = {};
            let theme = '#ccff00';
            let activeF = null;
            let activeD = null;

            for(let key of keys) {
                let d = JSON.parse(localStorage.getItem(key));
                if(d && d.folders) {
                    combinedFolders = { ...combinedFolders, ...d.folders };
                    if(key === 'gym_hub_v4') {
                        theme = d.themeColor || theme;
                        activeF = d.activeFolder;
                        activeD = d.activeDay;
                    }
                }
            }
            if(!activeF) activeF = Object.keys(combinedFolders)[0] || null;
            return { folders: combinedFolders, themeColor: theme, activeFolder: activeF, activeDay: activeD };
        }

        let hub = loadData();

        function applyTheme() {
            document.documentElement.style.setProperty('--neon', hub.themeColor);
            document.getElementById('colorHex').innerText = hub.themeColor.toUpperCase();
            document.getElementById('colorPicker').value = hub.themeColor;
        }

        function saveAll() {
            localStorage.setItem('gym_hub_v4', JSON.stringify(hub));
            render();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
            renderSidebar();
        }

        function toggleModal() {
            if(!hub.activeFolder) return alert("Select a plan first!");
            document.getElementById('modal').classList.toggle('open');
            if(hub.activeDay) document.getElementById('dayIn').value = hub.activeDay;
        }

        function changeColor(val) {
            hub.themeColor = val;
            applyTheme();
            saveAll();
        }

        function addFolder() {
            let name = prompt("Plan Name:");
            if(name) {
                let id = "f" + Date.now();
                hub.folders[id] = { name: name.toUpperCase(), days: {} };
                hub.activeFolder = id;
                hub.activeDay = null;
                saveAll();
                renderSidebar();
            }
        }

        function renderSidebar() {
            let list = document.getElementById('folderList');
            list.innerHTML = "";
            Object.keys(hub.folders).forEach(id => {
                list.innerHTML += `<div class="folder-item ${id == hub.activeFolder ? 'active' : ''}" onclick="selectFolder('${id}')">
                    <span>${hub.folders[id].name}</span>
                    <span onclick="event.stopPropagation(); deleteFolder('${id}')" style="color:#ff4444;">🗑️</span>
                </div>`;
            });
        }

        function selectFolder(id) {
            hub.activeFolder = id;
            let days = Object.keys(hub.folders[id].days);
            hub.activeDay = days.length > 0 ? days[0] : null;
            saveAll();
            toggleSidebar();
        }

        function saveExercise() {
            let day = document.getElementById('dayIn').value.trim().toUpperCase();
            let name = document.getElementById('exIn').value.trim();
            if(!day || !name) return alert("Fill Name and Day!");
            
            if(!hub.folders[hub.activeFolder].days[day]) hub.folders[hub.activeFolder].days[day] = [];
            
            hub.folders[hub.activeFolder].days[day].push({
                name, 
                sets: document.getElementById('setIn').value || 0,
                weight: document.getElementById('kgIn').value || 0,
                reps: document.getElementById('repIn').value || 0,
                done: false
            });
            
            hub.activeDay = day;
            saveAll();
            
            // تصفير الخانات مع بقاء اليوم
            document.getElementById('exIn').value = "";
            document.getElementById('setIn').value = "";
            document.getElementById('kgIn').value = "";
            document.getElementById('repIn').value = "";
            document.getElementById('modal').classList.remove('open');
        }

        function render() {
            const main = document.getElementById('main');
            const tabBar = document.getElementById('tabBar');
            const folderTitle = document.getElementById('folderTitle');

            if(!hub.activeFolder || !hub.folders[hub.activeFolder]) {
                main.innerHTML = `<div style="text-align:center; margin-top:100px; color:#444;">OPEN MENU ☰</div>`;
                return;
            }

            let folder = hub.folders[hub.activeFolder];
            folderTitle.innerText = folder.name;
            tabBar.innerHTML = "";
            Object.keys(folder.days).forEach(day => {
                tabBar.innerHTML += `<div class="tab ${day === hub.activeDay ? 'active' : ''}" onclick="hub.activeDay='${day}'; saveAll();">${day}</div>`;
            });

            main.innerHTML = "";
            if(hub.activeDay && folder.days[hub.activeDay]) {
                folder.days[hub.activeDay].forEach((ex, idx) => {
                    main.innerHTML += `
                        <div class="ex-card ${ex.done ? 'done' : ''}">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <span class="ex-name">${ex.name}</span>
                                <div class="check-box" onclick="toggleDone(${idx})"></div>
                            </div>
                            <div class="controls">
                                <div class="input-group"><label>SETS</label><input type="number" value="${ex.sets}" onchange="updateEx(${idx},'sets',this.value)"></div>
                                <div class="input-group"><label>KG</label><input type="number" value="${ex.weight}" onchange="updateEx(${idx},'weight',this.value)"></div>
                                <div class="input-group"><label>REPS</label><input type="number" value="${ex.reps || 0}" onchange="updateEx(${idx},'reps',this.value)"></div>
                                <button onclick="deleteEx(${idx})" style="background:none; border:none; color:#ff4444; margin-left:auto; font-size:22px;">🗑️</button>
                            </div>
                        </div>`;
                });
            }
        }

        function toggleDone(idx) { hub.folders[hub.activeFolder].days[hub.activeDay][idx].done = !hub.folders[hub.activeFolder].days[hub.activeDay][idx].done; saveAll(); }
        function updateEx(idx, f, v) { hub.folders[hub.activeFolder].days[hub.activeDay][idx][f] = v; saveAll(); }
        function deleteEx(idx) { if(confirm("Delete exercise?")) { hub.folders[hub.activeFolder].days[hub.activeDay].splice(idx,1); saveAll(); } }
        function deleteFolder(id) { if(confirm("Delete plan?")) { delete hub.folders[id]; hub.activeFolder = Object.keys(hub.folders)[0] || null; saveAll(); renderSidebar(); } }
        function exportHub() { navigator.clipboard.writeText(btoa(unescape(encodeURIComponent(JSON.stringify(hub))))).then(() => alert("COPIED!")); }
        function importHub() { let code = prompt("Paste code:"); if(code) { hub = JSON.parse(decodeURIComponent(escape(atob(code)))); applyTheme(); saveAll(); } }

        applyTheme();
        render();
    </script>
</body>
</html>
